<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<style>
			*{
				box-sizing:border-box;
			}
			html,body{
				width:100%;
				height:100%;
				margin:0;
				padding:0;
			}
			body{
				display:flex;
				justify-content:center;
				align-items:center;
				font-family:monospace;
				background:url(blancotrans.png),url(blancotrans.png),url(fondo.jpeg);
				background-size:cover;
				background-position:center;
				overflow:hidden;
				gap:20px;
				padding:20px;
			}
			.contenedor{
				display:flex;
				align-items:flex-start;
				gap:20px;
			}
			main{
				width:340px;
				height:72px;
				border:1px solid rgba(255,255,255,0.18);
				padding:14px;
				display:flex;
				flex-direction:column;
				justify-content:flex-end;
				gap:12px;
				overflow:hidden;
				background:rgba(0,0,0,0.45);
				transition:height 0.45s ease, box-shadow 0.3s ease, background 0.3s ease;
				backdrop-filter:blur(10px);
				-webkit-backdrop-filter:blur(10px);
				border-radius:14px;
				box-shadow:0 12px 30px rgba(0,0,0,0.35);
			}
			main.abierto{
				height:540px;
				justify-content:space-between;
				background:rgba(0,0,0,0.52);
				box-shadow:0 18px 40px rgba(0,0,0,0.45);
			}
			section{
				display:flex;
				flex-direction:column;
				gap:10px;
				flex:1;
				min-height:0;
				overflow-y:auto;
				overflow-x:hidden;
				padding-right:6px;
				opacity:0;
				transform:translateY(8px);
				transition:opacity 0.3s ease, transform 0.3s ease;
				pointer-events:none;
				scroll-behavior:smooth;
				scrollbar-width:thin;
				scrollbar-color:rgba(255,255,255,0.25) transparent;
			}
			main.abierto section{
				opacity:1;
				transform:translateY(0);
				pointer-events:auto;
			}
			section::-webkit-scrollbar{
				width:8px;
			}
			section::-webkit-scrollbar-track{
				background:transparent;
				border-radius:10px;
			}
			section::-webkit-scrollbar-thumb{
				background:rgba(255,255,255,0.20);
				border-radius:10px;
				border:2px solid transparent;
				background-clip:padding-box;
			}
			section::-webkit-scrollbar-thumb:hover{
				background:rgba(255,255,255,0.35);
				background-clip:padding-box;
			}
			input{
				width:100%;
				border:1px solid rgba(255,255,255,0.14);
				padding:12px 14px;
				outline:none;
				color:white;
				font-family:monospace;
				background:rgba(255,255,255,0.08);
				border-radius:10px;
				transition:border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
				flex-shrink:0;
			}
			input::placeholder{
				color:rgba(255,255,255,0.55);
			}
			input:focus{
				border-color:rgba(255,255,255,0.35);
				background:rgba(255,255,255,0.12);
				box-shadow:0 0 0 3px rgba(255,255,255,0.08);
			}
			article{
				padding:10px 12px;
				border-radius:12px;
				max-width:82%;
				width:fit-content;
				word-break:break-word;
				line-height:1.45;
				box-shadow:0 4px 10px rgba(0,0,0,0.12);
				animation:aparecer 0.25s ease;
			}
			.p{
				background:rgb(200,255,200);
				border-radius:6px 12px 12px 12px;
				align-self:flex-start;
				color:#1f2a1f;
			}
			.r{
				background:rgb(200,255,255);
				border-radius:12px 6px 12px 12px;
				align-self:flex-end;
				color:#1b2a2a;
			}
			.ficha{
				width: 302px;
    min-height: 120px;
    padding: 16px;
    padding-left: 60px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    color: white;
    opacity: 0;
    transform: translateX(10px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    left: -65px;
    top: 31px;
    position: relative;
    z-index: -10;
			}
			.ficha.visible{
				opacity:1;
				transform:translateX(0);
				pointer-events:auto;
			}
			.ficha h3{
				margin:0 0 12px 0;
				font-size:16px;
			}
			.ficha .linea{
				margin-bottom:8px;
				font-size:13px;
				line-height:1.4;
				color:rgba(255,255,255,0.88);
			}
			.ficha .label{
				color:rgba(255,255,255,0.55);
			}
			.nuevo{
				display:inline-block;
				padding:6px 10px;
				border-radius:999px;
				background:rgba(255,255,255,0.10);
				border:1px solid rgba(255,255,255,0.12);
				color:#fff;
				font-size:12px;
			}
			@keyframes aparecer{
				from{
					opacity:0;
					transform:translateY(6px);
				}
				to{
					opacity:1;
					transform:translateY(0);
				}
			}
			@media (max-width:900px){
				.contenedor{
					flex-direction:column;
					align-items:center;
				}
				.ficha{
					width:340px;
				}
			}
		</style>
	</head>
	<body>
		<div class="contenedor">
			<main>
				<section></section>
				<input type="text" placeholder="Introduce tu teléfono">
			</main>

			<aside class="ficha" id="fichaUsuario">
				<h3>Usuario</h3>
				<div id="contenidoFicha"></div>
			</aside>
		</div>

		<script>
			let entrada = document.querySelector("input")
			let seccion = document.querySelector("section")
			let main = document.querySelector("main")
			let ficha = document.querySelector("#fichaUsuario")
			let contenidoFicha = document.querySelector("#contenidoFicha")

			let telefono = ""
			let telefonoIntroducido = false

			function insertarMensaje(texto, clase){
				let articulo = document.createElement("article")
				articulo.classList.add(clase)
				articulo.textContent = texto
				seccion.appendChild(articulo)
				seccion.scrollTop = seccion.scrollHeight
			}

			function mostrarFichaUsuario(usuario){
				ficha.classList.add("visible")

				if(!usuario || !usuario.existe){
					contenidoFicha.innerHTML = `
						<div class="linea"><span class="nuevo">Nuevo usuario</span></div>
						<div class="linea"><span class="label">Teléfono:</span> ${telefono}</div>
					`
					return
				}

				contenidoFicha.innerHTML = `
					<div class="linea"><span class="label">Nombre:</span> ${usuario.nombre || ""}</div>
					<div class="linea"><span class="label">Apellidos:</span> ${usuario.apellidos || ""}</div>
					<div class="linea"><span class="label">Email:</span> ${usuario.email || ""}</div>
					<div class="linea"><span class="label">Teléfono:</span> ${usuario.telefono || ""}</div>
					<div class="linea"><span class="label">Curso:</span> ${usuario.curso_matriculado || ""}</div>
				`
			}

			function identificarTelefono(tel){
				fetch("back.php", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						accion: "identificar",
						telefono: tel
					})
				})
				.then(function(respuesta){
					return respuesta.json()
				})
				.then(function(datos){
					mostrarFichaUsuario(datos)
					insertarMensaje("Perfecto. Ya puedes escribir tu pregunta.", "r")
				})
				.catch(function(){
					mostrarFichaUsuario({ existe:false })
					insertarMensaje("Perfecto. Ya puedes escribir tu pregunta.", "r")
				})
			}

			entrada.onkeypress = function(tecla){
				if(tecla.charCode == 13){
					let valor = this.value.trim()
					if(valor == ""){return}

					this.value = ""

					if(!telefonoIntroducido){
						telefono = valor
						telefonoIntroducido = true

						main.classList.add("abierto")
						insertarMensaje("Mi teléfono es: " + telefono, "p")
						entrada.placeholder = "Introduce tu pregunta"

						identificarTelefono(telefono)
						return
					}

					insertarMensaje(valor, "p")

					fetch("back.php", {
						method: "POST",
						headers: {
							"Content-Type": "application/json"
						},
						body: JSON.stringify({
							accion: "chat",
							mensaje: valor,
							telefono: telefono
						})
					})
					.then(function(respuesta){
						return respuesta.text()
					})
					.then(function(datos){
						insertarMensaje(datos, "r")
					})
					.catch(function(){
						insertarMensaje("Ha ocurrido un error al contactar con el servidor.", "r")
					})
				}
			}
		</script>
	</body>
</html>
